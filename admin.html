<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapido Rör – Admin: Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  min-height: 100vh;
}
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  text-align: center;
}
.login-box .lock-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #eef2f6;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.5rem;
  color: #1a73e8;
}
.login-box h1 {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.login-box p {
  color: #64748b;
  font-size: 0.9rem;
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  font-family: 'Poppins', sans-serif;
  font-size: 0.95rem;
  margin-bottom: 16px;
  transition: border-color 0.3s;
}
.login-box input:focus {
  outline: none;
  border-color: #1a73e8;
}
.login-box .error {
  color: #dc2626;
  font-size: 0.85rem;
  margin-bottom: 12px;
  display: none;
}
.admin-screen {
  display: none;
  padding: 32px 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}
.admin-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
}
.admin-header h1 i { color: #1a73e8; margin-right: 8px; }
.admin-header .badge {
  background: #1a73e8;
  color: #fff;
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 0.85rem;
  font-weight: 500;
}
.stats-row {
  display: flex;
  gap: 20px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.stat-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px 24px;
  flex: 1;
  min-width: 140px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  border: 1px solid #eef2f6;
}
.stat-card .num {
  font-size: 1.8rem;
  font-weight: 700;
  color: #1a73e8;
}
.stat-card .label {
  font-size: 0.8rem;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}
.table-wrap {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border: 1px solid #eef2f6;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 640px;
}
th {
  text-align: left;
  padding: 14px 18px;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #64748b;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
}
td {
  padding: 14px 18px;
  font-size: 0.9rem;
  border-bottom: 1px solid #f1f5f9;
  color: #475569;
}
tr:hover td { background: #f8fafc; }
td .service-tag {
  display: inline-block;
  background: #eef2f6;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  color: #475569;
}
td .date-tag {
  font-size: 0.8rem;
  color: #94a3b8;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
}
.empty-state i {
  font-size: 2.5rem;
  margin-bottom: 16px;
  color: #cbd5e1;
}
.empty-state h3 {
  color: #64748b;
  margin-bottom: 6px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  border-radius: 8px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: #1a73e8;
  color: #fff;
  width: 100%;
  justify-content: center;
}
.btn-primary:hover { background: #1557b0; }
.btn-outline {
  background: transparent;
  color: #64748b;
  border: 1px solid #e2e8f0;
}
.btn-outline:hover { border-color: #1a73e8; color: #1a73e8; }
.btn-danger {
  background: #fee2e2;
  color: #dc2626;
}
.btn-danger:hover { background: #fecaca; }
.actions-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
@media (max-width: 767px) {
  .admin-screen { padding: 20px 16px; }
  .admin-header h1 { font-size: 1.2rem; }
  th, td { padding: 10px 12px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="lock-icon"><i class="fas fa-lock"></i></div>
    <h1>Rapido Rör Admin</h1>
    <p>Ange lösenord för att visa leads</p>
    <div class="error" id="loginError">Fel lösenord. Försök igen.</div>
    <input type="password" id="passwordInput" placeholder="Lösenord" autocomplete="off">
    <button class="btn btn-primary" id="loginBtn"><i class="fas fa-key"></i> Logga in</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="admin-header">
    <h1><i class="fas fa-wrench" style="color:#1a73e8;"></i> Rapido <span style="color:#1a73e8;">Rör</span> – Admin</h1>
    <div class="badge"><i class="fas fa-database"></i> <span id="leadCount">0</span> leads</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">Totalt</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToday">0</div>
      <div class="label">Idag</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statModal">0</div>
      <div class="label">Modal</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statContact">0</div>
      <div class="label">Kontakt</div>
    </div>
  </div>

  <div class="actions-bar">
    <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Uppdatera</button>
    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash-alt"></i> Rensa alla</button>
    <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> Exportera CSV</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Namn</th>
          <th>Telefon</th>
          <th>E-post</th>
          <th>Tjänst</th>
          <th>Meddelande</th>
          <th>Källa</th>
          <th>Datum</th>
        </tr>
      </thead>
      <tbody id="leadsBody">
      </tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <i class="fas fa-inbox"></i>
      <h3>Inga leads än</h3>
      <p>När besökare skickar formuläret visas de här.</p>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'rapido2025';
const STORAGE_KEY = 'rapido_leads';

const loginScreen = document.getElementById('loginScreen');
const adminScreen = document.getElementById('adminScreen');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const leadsBody = document.getElementById('leadsBody');
const emptyState = document.getElementById('emptyState');
const leadCount = document.getElementById('leadCount');
const refreshBtn = document.getElementById('refreshBtn');
const clearBtn = document.getElementById('clearBtn');
const exportBtn = document.getElementById('exportBtn');

// Stats elements
const statTotal = document.getElementById('statTotal');
const statToday = document.getElementById('statToday');
const statModal = document.getElementById('statModal');
const statContact = document.getElementById('statContact');

function getLeads() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('sv-SE', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function getTodayStr() {
  return new Date().toISOString().slice(0, 10);
}

function renderTable() {
  const leads = getLeads();
  
  if (leads.length === 0) {
    leadsBody.innerHTML = '';
    emptyState.style.display = 'block';
    leadCount.textContent = '0';
    statTotal.textContent = '0';
    statToday.textContent = '0';
    statModal.textContent = '0';
    statContact.textContent = '0';
    return;
  }

  emptyState.style.display = 'none';
  leadCount.textContent = leads.length;
  statTotal.textContent = leads.length;

  const todayStr = getTodayStr();
  const todayLeads = leads.filter(l => l.created_at && l.created_at.slice(0, 10) === todayStr);
  statToday.textContent = todayLeads.length;
  statModal.textContent = leads.filter(l => l.source === 'modal' || !l.source).length;
  statContact.textContent = leads.filter(l => l.source === 'contact').length;

  // Reverse to show newest first
  const sorted = [...leads].reverse();

  leadsBody.innerHTML = sorted.map((lead, i) => `
    <tr>
      <td style="color:#94a3b8;font-size:0.8rem;">${sorted.length - i}</td>
      <td><strong>${escapeHtml(lead.name)}</strong></td>
      <td><a href="tel:${escapeHtml(lead.phone)}" style="color:#1a73e8;">${escapeHtml(lead.phone)}</a></td>
      <td><a href="mailto:${escapeHtml(lead.email)}" style="color:#1a73e8;">${escapeHtml(lead.email)}</a></td>
      <td>${lead.service ? '<span class="service-tag">' + escapeHtml(lead.service) + '</span>' : '—'}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(lead.message || '')}">${lead.message ? escapeHtml(lead.message) : '—'}</td>
      <td><span class="service-tag">${escapeHtml(lead.source || 'modal')}</span></td>
      <td><span class="date-tag">${formatDate(lead.created_at)}</span></td>
    </tr>
  `).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function exportCSV() {
  const leads = getLeads();
  if (leads.length === 0) {
    alert('Inga leads att exportera.');
    return;
  }
  const headers = ['Namn', 'Telefon', 'E-post', 'Tjänst', 'Meddelande', 'Källa', 'Datum'];
  const rows = leads.map(l => [
    l.name || '',
    l.phone || '',
    l.email || '',
    l.service || '',
    (l.message || '').replace(/"/g, '""'),
    l.source || 'modal',
    l.created_at || ''
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rapido_leads_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Login
function doLogin() {
  if (passwordInput.value === PASSWORD) {
    sessionStorage.setItem('rapido_admin_auth', 'true');
    loginScreen.style.display = 'none';
    adminScreen.style.display = 'block';
    renderTable();
  } else {
    loginError.style.display = 'block';
    passwordInput.value = '';
    passwordInput.focus();
  }
}

// Auto-login if already authenticated in this session
if (sessionStorage.getItem('rapido_admin_auth') === 'true') {
  loginScreen.style.display = 'none';
  adminScreen.style.display = 'block';
  renderTable();
}

loginBtn.addEventListener('click', doLogin);
passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Refresh
refreshBtn.addEventListener('click', renderTable);

// Clear
clearBtn.addEventListener('click', () => {
  if (confirm('Är du säker? Alla leads kommer att raderas permanent.')) {
    localStorage.removeItem(STORAGE_KEY);
    renderTable();
  }
});

// Export
exportBtn.addEventListener('click', exportCSV);
</script>
</body>
</html>
